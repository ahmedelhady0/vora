<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORA - المتجر | تشكيلة العطور الكاملة</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-stone-50 to-amber-50">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="home.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-amber-600 to-amber-700 rounded-lg flex items-center justify-center text-white font-bold text-xl">V</div>
                <span class="text-2xl font-bold text-stone-900 tracking-wider">VORA</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="home.html" class="text-stone-600 hover:text-amber-600 transition font-medium">الرئيسية</a>
                <a href="shop.html" class="text-amber-600 font-bold transition">المتجر</a>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="document.getElementById('searchBox').classList.toggle('hidden'); document.getElementById('shopSearch').focus();" class="text-stone-700 hover:text-amber-600 transition">🔍</button>
                <button onclick="openCartDrawer()" class="relative text-stone-700 hover:text-amber-600 transition group">
                    <span class="text-2xl group-hover:scale-125 transition">🛍️</span>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-gradient-to-r from-red-500 to-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shadow-lg">0</span>
                </button>
                <button onclick="logout()" class="text-stone-700 hover:text-red-600 transition text-sm font-semibold">🚪 خروج</button>
            </div>
        </div>
        <!-- Search Box -->
        <div id="searchBox" class="hidden bg-stone-50 border-t border-stone-200 p-4 animate-slideDown">
            <input type="text" id="shopSearch" placeholder="ابحث عن عطرك المفضل..." class="w-full max-w-md px-4 py-2 rounded-lg border border-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
    </nav>

    <!-- Page Header -->
    <section class="pt-32 pb-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto text-center space-y-3">
            <span class="text-amber-600 font-semibold text-sm tracking-widest uppercase">✨ تشكيلة كاملة</span>
            <h1 class="text-4xl lg:text-5xl font-bold text-stone-900">متجر VORA</h1>
            <p class="text-stone-600 text-lg max-w-xl mx-auto">تصفح جميع عطورنا الفاخرة، وفلتر حسب الفئة والسعر لتجد توقيعك العطري</p>
        </div>
    </section>

    <!-- Filters Toolbar -->
    <section class="px-4 sm:px-6 lg:px-8 sticky top-20 z-30">
        <div class="max-w-7xl mx-auto bg-white/90 backdrop-blur-md border border-stone-200 rounded-2xl shadow-sm p-4 md:p-5 space-y-4">
            <div class="flex flex-col lg:flex-row gap-4 lg:items-center lg:justify-between">
                <!-- Category Pills -->
                <div id="categoryPills" class="flex flex-wrap gap-2">
                    <!-- populated by shop.js -->
                </div>

                <div class="flex flex-col sm:flex-row gap-3 lg:w-auto">
                    <!-- Price Range -->
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" placeholder="من (ج.م)" min="0" class="w-28 px-3 py-2 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        <span class="text-stone-400">—</span>
                        <input type="number" id="maxPrice" placeholder="إلى (ج.م)" min="0" class="w-28 px-3 py-2 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>

                    <!-- Sort -->
                    <select id="sortSelect" class="px-3 py-2 rounded-lg border border-stone-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                        <option value="default">الترتيب: الأحدث</option>
                        <option value="price-asc">السعر: من الأقل للأعلى</option>
                        <option value="price-desc">السعر: من الأعلى للأقل</option>
                        <option value="rating-desc">الأعلى تقييماً</option>
                        <option value="name-asc">الاسم: أ - ي</option>
                    </select>

                    <button onclick="window.resetFilters()" class="px-4 py-2 rounded-lg border-2 border-stone-200 text-stone-600 text-sm font-semibold hover:border-amber-400 hover:text-amber-600 transition whitespace-nowrap">
                        إعادة تعيين
                    </button>
                </div>
            </div>

            <p id="resultsCount" class="text-sm text-stone-500"></p>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="py-10 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            <div id="productsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Skeletons / products loaded by shop.js -->
            </div>
        </div>
    </section>

    <!-- Cart Drawer -->
    <div id="cartDrawerOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40 transition-all" onclick="closeCartDrawer()"></div>
    <div id="cartDrawer" class="fixed right-0 top-0 h-screen w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 overflow-hidden flex flex-col">
        <div class="sticky top-0 bg-gradient-to-b from-white to-stone-50 p-6 border-b border-stone-200 flex justify-between items-center">
            <div>
                <h3 class="text-2xl font-bold text-stone-900">🛍️</h3>
                <p class="text-sm text-stone-500">سلة التسوق</p>
            </div>
            <button onclick="closeCartDrawer()" class="text-2xl text-stone-400 hover:text-stone-900 transition">✕</button>
        </div>

        <div id="cartDrawerBody" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

        <div id="cartDrawerFooter" class="hidden sticky bottom-0 bg-gradient-to-t from-stone-50 via-white border-t border-stone-200 p-6 space-y-4">
            <div class="space-y-2 pb-4 border-b border-stone-200">
                <div class="flex justify-between text-sm text-stone-600">
                    <span>المجموع الفرعي:</span>
                    <span id="cartSubtotal">0 ج.م</span>
                </div>
                <div class="flex justify-between text-sm text-stone-600">
                    <span>الشحن:</span>
                    <span id="cartShipping">مجاني</span>
                </div>
            </div>
            <div class="flex justify-between text-lg font-bold text-stone-900 pb-4">
                <span>المجموع:</span>
                <span id="cartDrawerTotal" class="bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">0 ج.م</span>
            </div>
            <button onclick="goToCheckout()" class="w-full py-3 bg-gradient-to-r from-amber-600 to-amber-700 text-white font-bold rounded-lg hover:shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                💳 انتقل للدفع
            </button>
            <button onclick="closeCartDrawer()" class="w-full py-2 border-2 border-stone-200 text-stone-900 font-semibold rounded-lg hover:border-stone-300 transition">
                متابعة التسوق
            </button>
        </div>
    </div>

    <!-- Message Box -->
    <div id="messageBox" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 transition-all">
        <div class="bg-white rounded-2xl p-8 max-w-xs w-full text-center shadow-2xl border border-stone-100 space-y-4 animate-scaleIn">
            <div id="messageIcon" class="mx-auto text-4xl">✓</div>
            <p id="messageText" class="text-base font-medium text-stone-800 leading-relaxed"></p>
            <button onclick="hideMessage()" class="w-full py-2.5 bg-amber-600 text-white rounded-lg font-semibold hover:bg-amber-700 transition">
                حسناً
            </button>
        </div>
    </div>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-fadeInUp { animation: fadeInUp 0.5s ease-out; }
        .animate-slideDown { animation: slideDown 0.3s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .skeleton {
            background: linear-gradient(90deg, #f5f4f2 25%, #ece9e5 37%, #f5f4f2 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }
        .category-pill {
            padding: 0.5rem 1.1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1.5px solid #e7e0d8;
            color: #57534e;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .category-pill:hover {
            border-color: #d97706;
            color: #d97706;
        }
        .category-pill.active {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border-color: transparent;
            color: white;
        }
    </style>

    <script type="module" src="shop.js"></script>
</body>
</html>
