<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com">
    <title data-i18n="orderSuccess"></title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js" charset="utf-8"></script>
    <script type="module" src="icons.js"></script>
</head>
<body class="bg-gradient-to-b from-stone-50 to-amber-50 min-h-screen">

    <nav class="bg-white border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">
            <a href="home.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-amber-600 to-amber-700 rounded-lg flex items-center justify-center text-white font-bold text-sm">V</div>
                <span class="text-xl font-bold text-stone-900 tracking-wider">VORA</span>
            </a>
            <a href="home.html" class="text-stone-600 hover:text-amber-600 transition text-sm font-semibold" data-i18n="navHome"></a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-16">
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8 md:p-12 text-center space-y-6">
            <div class="mx-auto w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

             <div class="space-y-2">
                 <h1 class="text-3xl font-bold text-stone-900" data-i18n="orderSuccess"></h1>
                 <p class="text-stone-600" data-i18n="orderSuccessMsg"></p>
             </div>

             <div id="orderDetails" class="bg-amber-50 rounded-xl p-6 text-right space-y-3">
                 <p class="text-stone-500 text-sm" id="loadingMsg" data-i18n="loading"></p>
             </div>

            <div class="bg-stone-50 rounded-xl p-6 text-right space-y-3">
                 <h3 class="font-bold text-stone-900" data-i18n="checkoutQuickDetails"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg></h3>
                 <ul class="space-y-2 text-sm text-stone-700">
                     <li class="flex items-start gap-2"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> <span data-i18n="confirmationProcessing"></span></li>
                     <li class="flex items-start gap-2"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> <span data-i18n="confirmationDelivery"></span></li>
                     <li class="flex items-start gap-2"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> <span data-i18n="footerWhatsappLabel"></span> <span id="whatsappDisplay">01000000000</span></li>
                 </ul>
            </div>

             <div class="flex flex-col sm:flex-row gap-3 pt-4">
                 <a href="home.html" class="flex-1 py-3 bg-gradient-to-r from-amber-600 to-amber-700 text-white rounded-lg font-semibold hover:shadow-lg transition" data-i18n="backBtn">
                 </a>
                 <a href="shop.html" class="flex-1 py-3 border-2 border-amber-600 text-amber-600 rounded-lg font-semibold hover:bg-amber-50 transition" data-i18n="cartContinue">
                 </a>
             </div>
        </div>
    </div>

    <script type="module" src="confirmation-page.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script></body>
</html>
