<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="trackPageTitle"></title>
    <meta name="description" content="" data-i18n="trackPageDesc" data-i18n-attr="content">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js" charset="utf-8"></script>
    <script type="module" src="icons.js"></script>
</head>
<body class="bg-stone-50 min-h-screen">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="home.html" class="text-2xl font-bold text-stone-900 tracking-widest" style="font-family:'Playfair Display',serif;">VORA</a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-stone-700 hover:text-amber-600 transition text-lg"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
            </div>
        </div>
    </nav>
    <section class="pt-32 pb-20 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-stone-900 text-center mb-8" style="font-family:'Playfair Display',serif;" id="trackTitle" data-i18n="trackPageTitle"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16 2 16M18 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M10 10 h4 v4 h-4 z"/></svg></h1>

            <div class="bg-white rounded-2xl p-6 border border-stone-200 mb-6">
                <form onsubmit="return trackOrder(event)" class="flex gap-3">
                     <input type="text" id="orderIdInput" data-i18n-placeholder="trackOrderPlaceholder" placeholder="Order ID (e.g. VORA-1712345678901)" class="flex-1 border border-stone-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500" required>
                    <button type="submit" class="px-6 py-2.5 bg-amber-600 text-white rounded-lg font-bold text-sm hover:bg-amber-700 whitespace-nowrap" data-i18n="trackBtn"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
                </form>
            </div>

            <div id="trackResult" class="space-y-4" style="display:none;"></div>
        </div>
    </section>
    <script type="module" src="tracking-page.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));</script></body>
</html>
