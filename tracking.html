<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORA - تتبع الطلب</title>
    <meta name="description" content="تتبع حالة طلبك في VORA">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js"></script>
</head>
<body class="bg-stone-50 min-h-screen">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="home.html" class="text-2xl font-bold text-stone-900 tracking-widest" style="font-family:'Playfair Display',serif;">VORA</a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-stone-700 hover:text-amber-600 transition text-lg">👤</a>
            </div>
        </div>
    </nav>
    <section class="pt-32 pb-20 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-stone-900 text-center mb-8" style="font-family:'Playfair Display',serif;" id="trackTitle">📦 تتبع الطلب</h1>

            <div class="bg-white rounded-2xl p-6 border border-stone-200 mb-6">
                <form onsubmit="return trackOrder(event)" class="flex gap-3">
                    <input type="text" id="orderIdInput" placeholder="رقم الطلب (مثال: VORA-1712345678901)" class="flex-1 border border-stone-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500" required>
                    <button type="submit" class="px-6 py-2.5 bg-amber-600 text-white rounded-lg font-bold text-sm hover:bg-amber-700 whitespace-nowrap">🔍 تتبع</button>
                </form>
            </div>

            <div id="trackResult" class="space-y-4" style="display:none;"></div>
        </div>
    </section>
    <script>
        function trackOrder(e) {
            e.preventDefault();
            const orderId = document.getElementById('orderIdInput').value.trim();
            const orders = JSON.parse(localStorage.getItem('vora_orders')) || [];
            const order = orders.find(o => o.orderId === orderId);
            const result = document.getElementById('trackResult');
            if (!order) {
                const lang = localStorage.getItem('vora_lang') || 'ar';
                result.style.display = 'block';
                result.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-2xl p-8 text-center"><span class="text-4xl">❌</span><p class="text-red-700 font-bold mt-3">${lang === 'ar' ? 'لم يتم العثور على الطلب' : 'Order not found'}</p><p class="text-red-500 text-sm mt-1">${lang === 'ar' ? 'تأكد من رقم الطلب وحاول مرة أخرى' : 'Check the order ID and try again'}</p></div>`;
                return false;
            }
            renderOrderStatus(order);
            return false;
        }

        function renderOrderStatus(order) {
            const lang = localStorage.getItem('vora_lang') || 'ar';
            const arStatuses = ['قيد المراجعة', 'قيد التجهيز', 'تم الشحن', 'تم التسليم'];
            const enStatuses = ['Pending Review', 'Processing', 'Shipped', 'Delivered'];
            const currentIdx = arStatuses.indexOf(order.status);
            const step = Math.max(0, currentIdx);
            const displayStatuses = lang === 'ar' ? arStatuses : enStatuses;
            const result = document.getElementById('trackResult');
            result.style.display = 'block';
            result.innerHTML = `
                <div class="bg-white rounded-2xl p-6 border border-stone-200">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-xs text-stone-400">${order.orderId}</span>
                        <span class="text-xs text-stone-400">${order.orderDate ? new Date(order.orderDate).toLocaleDateString(lang === 'ar' ? 'ar-EG' : 'en-US') : ''}</span>
                    </div>

                    <div class="flex items-center justify-between mb-6">
                        ${displayStatuses.map((s, i) => `
                            <div class="flex flex-col items-center ${i <= step ? 'text-amber-600' : 'text-stone-300'}">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold border-2 ${i <= step ? 'bg-amber-600 text-white border-amber-600' : 'border-stone-300 bg-white'}">${i + 1}</div>
                                <span class="text-[10px] mt-1 whitespace-nowrap font-semibold">${s}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="border-t border-stone-100 pt-4 space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-stone-400">${lang === 'ar' ? 'العميل' : 'Customer'}:</span><span class="font-semibold">${order.customerName || ''}</span></div>
                        <div class="flex justify-between"><span class="text-stone-400">${lang === 'ar' ? 'الإجمالي' : 'Total'}:</span><span class="font-bold text-amber-600">${order.total} ${lang === 'ar' ? 'ج.م' : 'EGP'}</span></div>
                        ${order.trackingId ? `<div class="flex justify-between"><span class="text-stone-400">${lang === 'ar' ? 'رقم التتبع' : 'Tracking #'}:</span><span class="font-semibold text-blue-600">${order.trackingId}</span></div>` : ''}
                        ${step >= 2 && arStatuses.indexOf(order.status) >= 2 ? `<a href="https://www.google.com/maps/dir/?api=1" target="_blank" class="block mt-3 text-center text-xs text-blue-600 underline">${lang === 'ar' ? 'تتبع الشحنة عبر الخريطة' : 'Track package on map'}</a>` : ''}
                    </div>
                    <div class="border-t border-stone-100 pt-4 mt-4">
                        <h4 class="text-xs font-bold text-stone-500 mb-2">${lang === 'ar' ? 'المنتجات' : 'Products'}</h4>
                        <div class="space-y-1">
                            ${(() => {
                                let items = [];
                                try { items = order.itemDetails ? JSON.parse(order.itemDetails) : []; } catch(e) {}
                                if (items.length) {
                                    return items.map(i => `<div class="flex justify-between text-sm"><span class="text-stone-700">${i.name} ×${i.qty}</span><span class="font-semibold text-amber-600">${i.price * i.qty} ${lang === 'ar' ? 'ج.م' : 'EGP'}</span></div>`).join('');
                                }
                                return `<p class="text-stone-500 text-xs">${order.items || ''}</p>`;
                            })()}
                        </div>
                    </div>
                </div>
                <a href="home.html" class="block text-center text-amber-600 hover:text-amber-700 text-sm font-semibold mt-2">← ${lang === 'ar' ? 'العودة للرئيسية' : 'Back to Home'}</a>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('orderId');
            if (id) {
                document.getElementById('orderIdInput').value = id;
                const orders = JSON.parse(localStorage.getItem('vora_orders')) || [];
                const order = orders.find(o => o.orderId === id);
                if (order) renderOrderStatus(order);
            }
        });
    </script>
</body>
</html>
