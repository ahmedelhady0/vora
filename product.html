        .breadcrumb a { color:#9c7c8c; text-decoration:none; transition:color 0.2s; }
        .breadcrumb a:hover { color:#c25a80; }
        .breadcrumb .separate { display:inline-flex; align-items:center; color:#d4b5c4; }
        .breadcrumb .separate svg { width:14px; height:14px; fill:currentColor; }
        .breadcrumb span:last-child { color:#3a1a2a; font-weight:600; }
        .section-title { font-size:20px; font-weight:700; color:#3a1a2a; margin-bottom:16px; font-family:'Playfair Display',serif; }
        .review-card { background:white; border:1px solid #f0d0d8; border-radius:16px; padding:20px; }
        .review-card .stars { color:#f59e0b; font-size:14px; }
        .review-card .name { font-weight:600; color:#3a1a2a; font-size:14px; }
        .review-card .date { font-size:11px; color:#9c7c8c; }
        .review-card .text { font-size:13px; color:#6b4c5a; margin-top:6px; }
        .detail-label { font-size:12px; color:#9c7c8c; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
        .detail-value { font-size:15px; color:#3a1a2a; font-weight:500; }
        .add-cart-page-btn { background:linear-gradient(135deg,#c25a80,#a04060); color:white; border:none; border-radius:14px; padding:16px 32px; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.3s; width:100%; }
        .add-cart-page-btn:hover { box-shadow:0 8px 24px rgba(194,90,128,0.35); transform:translateY(-1px); }
        .qty-selector { display:flex; align-items:center; gap:0; border:1.5px solid #f0d0d8; border-radius:12px; overflow:hidden; }
        .qty-selector button { width:42px; height:42px; background:#fce8f0; border:none; font-size:18px; font-weight:700; color:#3a1a2a; cursor:pointer; transition:background 0.2s; }
        .qty-selector button:hover { background:#f0d0d8; }
        .qty-selector span { width:48px; text-align:center; font-weight:700; font-size:16px; color:#3a1a2a; }
        .variant-label { font-size:13px; font-weight:600; color:#3a1a2a; margin-bottom:8px; }
        .variant-options { display:flex; flex-wrap:wrap; gap:8px; }
        .variant-option { padding:8px 16px; border:1.5px solid #e0c0c8; border-radius:10px; background:white; font-size:13px; font-weight:500; color:#3a1a2a; cursor:pointer; transition:all 0.2s; }
        .variant-option:hover { border-color:#c25a80; }
        .variant-option.active { border-color:#c25a80; background:#fce8f0; color:#c25a80; font-weight:700; }

        @media (max-width:768px) { .product-page-image { max-width:100%; } }
    </style>

        </div>
    </section>
    <section class="py-12 px-4 sm:px-6 lg:px-8 bg-white">
        <div class="max-w-7xl mx-auto">
            <h2 class="section-title" id="relatedTitle" data-i18n="relatedProducts"></h2>
            <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide" id="relatedProducts" style="scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;"></div>
        </div>
    </section>
    <section class="py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            <h2 class="section-title" id="recentlyTitle" data-i18n="recentlyViewed"></h2>
            <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide" id="recentlyViewedProducts" style="scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;"></div>
        </div>
    </section>
    <section class="py-12 px-4 sm:px-6 lg:px-8 bg-white">
        <div class="max-w-7xl mx-auto">
            <h2 class="section-title" data-i18n="customerReviews"></h2>
            <div id="reviewsContainer" class="space-y-4"></div>
            <div class="mt-8 bg-stone-50 rounded-2xl p-6 border border-stone-200">
                <h3 class="font-bold text-stone-900 mb-4" data-i18n="prodReviewTitle"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></h3>
                <div class="space-y-3">
                    <div class="flex items-center gap-1 text-2xl" id="reviewStarRating">
                        <span onclick="setReviewStar(1)" class="cursor-pointer hover:scale-110 transition"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                        <span onclick="setReviewStar(2)" class="cursor-pointer hover:scale-110 transition"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                        <span onclick="setReviewStar(3)" class="cursor-pointer hover:scale-110 transition"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                        <span onclick="setReviewStar(4)" class="cursor-pointer hover:scale-110 transition"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                        <span onclick="setReviewStar(5)" class="cursor-pointer hover:scale-110 transition"><svg class="w-5 h-5 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                    </div>
                     <input type="text" id="reviewName" data-i18n-placeholder="prodReviewName" placeholder="Your Name" class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm">
                     <textarea id="reviewText" data-i18n-placeholder="prodReviewText" placeholder="Write your review..." rows="3" class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm resize-none"></textarea>
                     <button onclick="submitReview()" class="px-6 py-2.5 bg-amber-600 text-white rounded-lg font-semibold hover:bg-amber-700 transition text-sm" data-i18n="prodReviewSuccess"></button>
                </div>
            </div>
        </div>
    </section>
    <footer id="footer" class="bg-stone-900 text-stone-400 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-2xl font-bold text-white tracking-widest" style="font-family:'Playfair Display',serif;">VORA</span>
            <p class="text-xs text-stone-500 mt-3">&copy; 2026 VORA. <span data-i18n="footerRights"></span>.</p>
        </div>
    </footer>
    <!-- Cart Drawer -->
    <div id="cartDrawerOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40 transition-all" onclick="closeCartDrawer()"></div>
    <div id="cartDrawer" class="fixed right-0 top-0 h-screen w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 overflow-hidden flex flex-col" style="height:100dvh;">
        <div class="sticky top-0 bg-gradient-to-b from-white to-stone-50 p-6 border-b border-stone-200 flex justify-between items-center">
            <div>
                <h3 class="text-2xl font-bold text-stone-900" data-i18n="cartDrawerTitle"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></h3>
                <p class="text-sm text-stone-500" data-i18n="cartDrawerSelected"></p>
            </div>
            <button onclick="closeCartDrawer()" class="text-2xl text-stone-400 hover:text-stone-900 transition"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div id="cartDrawerBody" class="flex-1 overflow-y-auto p-6 space-y-4" style="-webkit-overflow-scrolling:touch;overscroll-behavior:contain;"></div>
        <div id="cartDrawerFooter" class="hidden sticky bottom-0 bg-gradient-to-t from-stone-50 via-white border-t border-stone-200 p-6 space-y-4">
            <div class="space-y-2 pb-4 border-b border-stone-200">
                 <div class="flex justify-between text-sm text-stone-600">
                    <span data-i18n="cartDrawerSubtotal"></span>
                    <span id="cartSubtotal">0 EGP</span>
                </div>
                <div class="flex justify-between text-sm text-stone-600" style="display:none">
                    <span data-i18n="cartDrawerShipping"></span>
                    <span id="cartShipping" data-i18n="cartFree"></span>
                </div>
            </div>
            <div class="flex justify-between text-lg font-bold text-stone-900 pb-4">
                <span data-i18n="cartDrawerTotal"></span>
                <span id="cartDrawerTotal" class="bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">0 EGP</span>
            </div>
            <button onclick="goToCheckout()" class="w-full py-3 bg-gradient-to-r from-amber-600 to-amber-700 text-white font-bold rounded-lg hover:shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                <svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> <span data-i18n="cartDrawerCheckout"></span>
            </button>
            <button onclick="closeCartDrawer()" class="w-full py-2 border-2 border-stone-200 text-stone-900 font-semibold rounded-lg hover:border-stone-300 transition" data-i18n="cartDrawerContinue"></button>
        </div>
    </div>
    <div id="messageBox" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-xs w-full text-center shadow-2xl border border-stone-100 space-y-4">
            <div id="messageIcon" class="mx-auto text-4xl"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <p id="messageText" class="text-base font-medium text-stone-800 leading-relaxed"></p>
             <button onclick="hideMessage()" class="w-full py-2.5 bg-amber-600 text-white rounded-lg font-semibold hover:bg-amber-700 transition" data-i18n="okBtn"></button>
        </div>
    </div>
    <script type="module" src="product.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script></body>
</html>
