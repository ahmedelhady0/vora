<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - تسجيل الدخول الفاخر</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="login-shell min-h-screen flex items-center justify-center p-4">

    <div class="container login-card max-w-md w-full p-8 md:p-12">
        <div class="text-center mb-8">
            <div class="login-mark shadow-lg">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="24" y="4" width="16" height="8" rx="1.5" fill="currentColor" opacity="0.8"/>
                    <path d="M20 14 Q20 12 22 12 L42 12 Q44 12 44 14 L48 30 Q49 36 49 42 L49 56 Q49 60 45 60 L19 60 Q15 60 15 56 L15 42 Q15 36 16 30 Z"
                          stroke="currentColor" stroke-width="2" fill="none"/>
                    <line x1="15" y1="34" x2="49" y2="34" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
                </svg>
            </div>
            <h1 class="login-title tracking-widest">VORA</h1>
            <p class="login-tagline mt-1">عطور فاخرة · أناقة لا تنتهي</p>
        </div>

        <div class="space-y-4">
            <div>
                <input type="text" id="username" class="input-field w-full" placeholder="اسم المستخدم">
            </div>
            <div>
                <input type="password" id="password" class="input-field w-full" placeholder="كلمة المرور">
            </div>

            <button onclick="signIn()" class="btn-primary w-full py-4 text-base tracking-wide mt-2">
                تسجيل الدخول
            </button>

            <button onclick="signUp()" class="w-full py-3.5 text-sm font-semibold rounded-xl transition-all border border-amber-200 text-amber-800 bg-amber-50/50 hover:bg-amber-50">
                إنشاء حساب جديد
            </button>
        </div>

        <hr class="divider-gold my-6">

        <div class="rounded-xl p-3 text-center text-xs bg-stone-50 border border-stone-100 text-stone-500">
            تجربة حساب تجريبي: <span class="font-mono font-bold text-stone-700">admin / 123456</span>
        </div>
    </div>

    <!-- نافذة الرسائل المنبثقة بتصميم فخم -->
    <div id="messageBox" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 transition-all">
        <div class="bg-white rounded-2xl p-8 max-w-xs w-full text-center shadow-2xl border border-stone-100">
            <div id="messageIcon" class="mx-auto w-12 h-12 mb-3 text-3xl"></div>
            <p id="messageText" class="text-base font-medium text-stone-800 leading-relaxed"></p>
            <button onclick="hideMessage()" class="mt-6 btn-primary w-full py-2.5 text-sm">
                إغلاق
            </button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
