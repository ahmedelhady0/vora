<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - تسجيل الدخول</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-rose-100 flex items-center justify-center p-4">

    <div class="container max-w-md w-full p-10">
        <div class="text-center mb-10">
            <div class="mx-auto w-20 h-20 bg-gradient-to-br from-pink-600 to-rose-600 rounded-3xl flex items-center justify-center text-5xl mb-6 shadow-xl">🌹</div>
            <h1 class="text-5xl font-bold text-gray-900 tracking-tighter">VORA</h1>
            <p class="text-pink-600 mt-2 text-lg">عطور فاخرة • أناقة لا تنتهي</p>
        </div>

        <div class="space-y-5">
            <div>
                <input type="text" id="username" class="input-field w-full" placeholder="اسم المستخدم">
            </div>
            <div>
                <input type="password" id="password" class="input-field w-full" placeholder="كلمة المرور">
            </div>
            
            <button onclick="signIn()" 
                    class="btn-primary w-full py-4 text-lg font-semibold shadow-lg">
                تسجيل الدخول
            </button>
            
            <button onclick="signUp()" 
                    class="w-full py-4 text-lg font-medium border-2 border-pink-200 hover:border-pink-300 bg-white rounded-2xl transition-all">
                إنشاء حساب جديد
            </button>
        </div>

        <p class="text-center text-gray-500 text-sm mt-8">
            تجربة حساب تجريبي: admin / 123456
        </p>
    </div>

    <!-- Message Modal - Improved -->
    <div id="messageBox" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
            <div id="messageIcon" class="mx-auto w-16 h-16 mb-4"></div>
            <p id="messageText" class="text-lg font-medium text-gray-800"></p>
            <button onclick="hideMessage()" 
                    class="mt-8 btn-primary w-full py-3.5">
                إغلاق
            </button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
