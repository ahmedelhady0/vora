<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - تسجيل الدخول</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="login-shell min-h-screen flex items-center justify-center p-4">

    <div class="container login-card max-w-md w-full p-10">
        <div class="text-center mb-10">
            <div class="login-mark">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="24" y="4" width="16" height="8" rx="1.5" fill="currentColor" opacity="0.8"/>
                    <path d="M20 14 Q20 12 22 12 L42 12 Q44 12 44 14 L48 30 Q49 36 49 42 L49 56 Q49 60 45 60 L19 60 Q15 60 15 56 L15 42 Q15 36 16 30 Z"
                          stroke="currentColor" stroke-width="2" fill="none"/>
                    <line x1="15" y1="34" x2="49" y2="34" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
                </svg>
            </div>
            <h1 class="login-title">VORA</h1>
            <p class="login-tagline mt-2">عطور فاخرة · أناقة لا تنتهي</p>
        </div>

        <div class="space-y-5">
            <div>
                <input type="text" id="username" class="input-field w-full" placeholder="اسم المستخدم">
            </div>
            <div>
                <input type="password" id="password" class="input-field w-full" placeholder="كلمة المرور">
            </div>

            <button onclick="signIn()"
                    class="btn-primary w-full py-4 text-lg font-semibold">
                تسجيل الدخول
            </button>

            <button onclick="signUp()"
                    class="w-full py-4 text-lg font-medium border-2 rounded-3px transition-all"
                    style="border-color: var(--gold-mist); background: var(--paper); border-radius: 3px;">
                إنشاء حساب جديد
            </button>
        </div>

        <hr class="divider-gold my-8">

        <p class="text-center text-sm" style="color: var(--muted);">
            تجربة حساب تجريبي: admin / 123456
        </p>
    </div>

    <div id="messageBox" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
            <div id="messageIcon" class="mx-auto w-16 h-16 mb-4"></div>
            <p id="messageText" class="text-lg font-medium text-gray-800"></p>
            <button onclick="hideMessage()"
                    class="mt-8 btn-primary w-full py-3.5">
                إغلاق
            </button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
