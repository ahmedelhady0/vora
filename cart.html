<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cartPageTitle"></title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js" charset="utf-8"></script>
    <script type="module" src="icons.js"></script>
</head>
<body class="p-4 md:p-8">

    <div class="container max-w-3xl mx-auto p-6 md:p-8">

        <div class="site-header">
            <div>
                <h1 class="brand-logo" style="font-size:1.8rem;" data-i18n="cartPageTitle"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/><</h1>
                <p class="brand-tagline" data-i18n="cartPageDesc"></p>
            </div>
            <a href="home.html" class="btn-ghost" data-i18n="cartBackHome"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/><</a>
        </div>

        <div id="cartContent" class="space-y-4">
            <p class="text-center py-12" style="color: var(--text-muted);" data-i18n="cartEmptyMsg"></p>
        </div>

        <div id="checkoutForm" class="hidden mt-8 pt-8 space-y-4" style="border-top: 1px solid var(--border);">
            <h3 class="section-title" style="font-size:1.4rem; margin-bottom:16px;" data-i18n="cartShippingDetails"><svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="customerName" class="input-field w-full" data-i18n-placeholder="checkoutName" placeholder="Full Name">
                <input type="tel" id="customerPhone" class="input-field w-full" data-i18n-placeholder="checkoutPhone" placeholder="Phone Number">
            </div>

            <input type="text" id="customerAddress" class="input-field w-full" data-i18n-placeholder="checkoutAddress" placeholder="Full Address (Governorate / City / Street)">
            <input type="email" id="customerEmail" class="input-field w-full" data-i18n-placeholder="checkoutEmail" placeholder="Email (e.g: example@domain.com)" dir="ltr">

            <div class="p-6 rounded mt-6 space-y-2" style="background: var(--bg-warm);">
                <div class="flex justify-between" style="color: var(--text-primary);">
                    <span data-i18n="cartDrawerSubtotal"></span>
                    <span id="subtotalPrice">0 EGP</span>
                </div>
                <div class="flex justify-between" style="color: var(--text-primary);">
                    <span data-i18n="cartShipping"></span>
                    <span class="font-medium" style="color: var(--primary);" data-i18n="cartFree"></span>
                </div>
                <div class="flex justify-between text-xl font-bold pt-2" style="color: var(--text-primary); border-top: 1px solid var(--primary);">
                    <span data-i18n="cartTotalFinal"></span>
                    <span id="totalPrice">0 EGP</span>
                </div>
            </div>

            <button onclick="submitOrder()" class="btn-primary w-full py-4 text-lg mt-6">
                <svg class="w-4 h-4 inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg> <span data-i18n="cartSubmitOrder"></span>
            </button>
        </div>

    </div>

    <div id="messageBox" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl max-w-xs text-center">
            <div id="messageIcon" class="flex justify-center text-4xl mb-2"></div>
            <p id="messageText" class="text-lg font-medium"></p>
            <button onclick="hideMessage()" class="mt-6 btn-primary px-8" data-i18n="cartClose"></button>
        </div>
    </div>

    <script type="module" src="cart.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));</script></body>
</html>
