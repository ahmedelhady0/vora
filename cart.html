<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - سلة المشتريات</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 md:p-8">

    <div class="container max-w-3xl mx-auto p-6 md:p-8">

        <div class="site-header">
            <div>
                <h1 class="brand-logo" style="font-size:1.8rem;">🛍️ السلة</h1>
                <p class="brand-tagline">راجع عطورك المفضلة وأكمل طلبك</p>
            </div>
            <a href="home.html" class="btn-ghost">← العودة للرئيسية</a>
        </div>

        <div id="cartContent" class="space-y-4">
            <p class="text-center py-12" style="color: var(--muted);">السلة فارغة حالياً.. اذهب للرئيسية واكتشف عطورنا الفاخرة!</p>
        </div>

        <div id="checkoutForm" class="hidden mt-8 pt-8 space-y-4" style="border-top: 1px solid var(--gold-mist);">
            <h3 class="section-title" style="font-size:1.4rem; margin-bottom:16px;">📍 تفاصيل الشحن والتوصيل</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="customerName" class="input-field w-full" placeholder="الاسم بالكامل">
                <input type="tel" id="customerPhone" class="input-field w-full" placeholder="رقم الهاتف">
            </div>

            <input type="text" id="customerAddress" class="input-field w-full" placeholder="العنوان بالتفصيل (المدينة / الشارع / المبنى)">

            <div class="p-6 rounded mt-6 space-y-2" style="background: var(--gold-mist);">
                <div class="flex justify-between" style="color: var(--charcoal);">
                    <span>إجمالي المنتجات:</span>
                    <span id="subtotalPrice">0 ج.م</span>
                </div>
                <div class="flex justify-between" style="color: var(--charcoal);">
                    <span>مصاريف الشحن:</span>
                    <span class="font-medium" style="color: var(--wine);">مكافأة (شحن مجاني)</span>
                </div>
                <div class="flex justify-between text-xl font-bold pt-2" style="color: var(--wine-deep); border-top: 1px solid var(--gold);">
                    <span>المجموع النهائي:</span>
                    <span id="totalPrice">0 ج.م</span>
                </div>
            </div>

            <button onclick="submitOrder()" class="btn-primary w-full py-4 text-lg mt-6">
                🚀 تأكيد الطلب وإرساله
            </button>
        </div>

    </div>

    <div id="messageBox" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl max-w-xs text-center">
            <p id="messageText" class="text-lg font-medium"></p>
            <button onclick="hideMessage()" class="mt-6 btn-primary px-8">إغلاق</button>
        </div>
    </div>

    <script type="module" src="cart.js"></script>
</body>
</html>
